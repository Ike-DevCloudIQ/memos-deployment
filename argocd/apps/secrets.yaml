# Child app: secrets (placeholder / scaffold)
# Manages the `external-secrets` namespace as a landing zone for a
# secrets tool (e.g. External Secrets Operator or Sealed Secrets).
# It is real + Healthy today; add a chart/manifests later to grow it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Ike-DevCloudIQ/memos-deployment
    targetRevision: HEAD
    path: k8s-apps/secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  info:
    - name: Purpose
      value: Secrets management landing zone (scaffold)
