# Child app: memos (the main application)
# Kept in the restricted memos-project. Identical behaviour to the
# previous standalone argocd-application.yaml, now managed by root.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: memos
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: memos-project

  # Keep secret values managed out-of-band while still managing the Secret object.
  # This prevents Argo from overwriting runtime credentials with placeholder values.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: memos-db-secret
      namespace: memos
      jsonPointers:
        - /data

  source:
    repoURL: https://github.com/Ike-DevCloudIQ/memos-deployment
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: memos

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true

  info:
    - name: Repository
      value: https://github.com/Ike-DevCloudIQ/memos-deployment
    - name: Sync Policy
      value: Automatic (prune=true, selfHeal=true)
