name: Build and Deploy Memos

on:
  push:
    branches: [main]
    paths:
      - 'app/**'          # Only trigger when app code changes
  workflow_dispatch:      # Allow manual runs from GitHub UI

# Minimal permissions (security best practice)
permissions:
  id-token: write         # Required for OIDC AWS auth
  contents: write         # Required to push manifest updates

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: memos   # Matches ECR repo name in bootstrap

jobs:
  # ==============================================================
  # Job 1: Build Docker image and push to ECR
  # ==============================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      # Step 1: Get the latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials using OIDC
      # No long-lived access keys — uses GitHub's OIDC provider
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Set image metadata (tag with short commit SHA)
      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image will be tagged: $SHORT_SHA"

      # Step 5: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                        # Build from repository root
          file: app/Dockerfile              # Path to Dockerfile
          push: true                        # Push to ECR after build
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha             # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

  # ==============================================================
  # Job 2: Update Kubernetes manifest with new image tag
  # ArgoCD will detect this commit and deploy automatically
  # ==============================================================
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: build         # Only runs after build job succeeds

    steps:
      # Step 1: Checkout code (need write permission)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Update deployment.yaml with new image tag
      - name: Update image tag in deployment.yaml
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          NEW_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          echo "Updating image to: $NEW_IMAGE"
          
          # Replace the image line in deployment.yaml
          sed -i "s|image: .*memos:.*|image: $NEW_IMAGE|" k8s/deployment.yaml
          
          # Show the change
          grep "image:" k8s/deployment.yaml

      # Step 3: Commit and push the manifest change
      # [skip ci] prevents this commit from triggering the workflow again
      - name: Commit and push manifest update
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git add k8s/deployment.yaml
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit — image tag already up to date"
          else
            git commit -m "chore: update memos image to $IMAGE_TAG [skip ci]
            
            Automated by GitHub Actions
            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_number }}
            Triggered by: ${{ github.actor }}"
            
            git push origin main
            echo "Manifest updated and pushed — ArgoCD will deploy shortly"
          fi
